<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/assets/css/style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin: auto;
            margin-top: 10px;
        }

        img {
            max-width: 70%;
            width: 350px;
            margin: auto;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            position: relative;
            margin: auto;
            margin-top: 10px;
            display: flex;
            justify-items: center;
            align-items: center;
            width: 100px;
            height: 40px;
            background: var(--card-bg);
            border: 1px solid var(--danger);
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
        }
        button a {
            text-align: center;
            margin: auto;
            font-weight: 750;
        }
    </style>
</head>
<body>

    <img src="/svg/404.svg" alt="Page Not Found">
    <h1>Page Not Found</h1>

    <button>
        <a href="/">Back</a>
    </button>

</body>
</html>
